# =============================================================================
# Matomo Analytics - Docker Compose for Coolify Deployment
# =============================================================================
#
# Coolify auto-sets SERVICE_FQDN_APP for routing via Traefik.
# Set MARIADB_PASSWORD & MARIADB_ROOT_PASSWORD in Coolify env vars.
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MariaDB Database
  # ---------------------------------------------------------------------------
  db:
    image: mariadb:11
    command: --max-allowed-packet=64MB
    restart: always
    volumes:
      - db-data:/var/lib/mysql
    environment:
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_DATABASE: matomo
      MARIADB_USER: matomo
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DISABLE_UPGRADE_BACKUP: "1"
      MARIADB_INITDB_SKIP_TZINFO: "1"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    networks:
      - matomo-internal

  # ---------------------------------------------------------------------------
  # Matomo Application (Apache variant)
  # ---------------------------------------------------------------------------
  app:
    image: matomo:5-apache
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "80"
    volumes:
      - matomo-data:/var/www/html
    environment:
      MATOMO_DATABASE_HOST: db
      MATOMO_DATABASE_PORT: "3306"
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_TABLES_PREFIX: matomo_
      MATOMO_DATABASE_USERNAME: matomo
      MATOMO_DATABASE_PASSWORD: ${MARIADB_PASSWORD}
      MATOMO_DATABASE_DBNAME: matomo
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}
    networks:
      - matomo-internal

  # ---------------------------------------------------------------------------
  # Cron Archiver (processes reports in background)
  # ---------------------------------------------------------------------------
  cron:
    image: matomo:5-apache
    restart: always
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - matomo-data:/var/www/html
    environment:
      MATOMO_DATABASE_HOST: db
      MATOMO_DATABASE_PORT: "3306"
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_TABLES_PREFIX: matomo_
      MATOMO_DATABASE_USERNAME: matomo
      MATOMO_DATABASE_PASSWORD: ${MARIADB_PASSWORD}
      MATOMO_DATABASE_DBNAME: matomo
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}
    entrypoint: /bin/bash
    command: >
      -c "echo '*/5 * * * * php /var/www/html/console core:archive --url=${SERVICE_FQDN_APP} >> /var/log/matomo-archive.log 2>&1' > /etc/cron.d/matomo-archive
      && chmod 0644 /etc/cron.d/matomo-archive
      && crontab /etc/cron.d/matomo-archive
      && cron -f"
    networks:
      - matomo-internal

volumes:
  db-data:
    driver: local
  matomo-data:
    driver: local

networks:
  matomo-internal:
    driver: bridge
