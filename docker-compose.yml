# =============================================================================
# Matomo Analytics - Docker Compose for Coolify Deployment
# =============================================================================
#
# Based on the official Matomo Docker example:
#   https://github.com/matomo-org/docker/tree/master/.examples/apache
#
# Usage:
#   1. Copy .env.example to .env and fill in values
#   2. Deploy via Coolify (paste this compose) or run: docker compose up -d
#   3. Visit https://analytics.yourdomain.com to run the Matomo installer
#   4. Set up cron archiving (see below)
#
# Coolify Notes:
#   - Set domain to analytics.yourdomain.com in Coolify UI
#   - Coolify's Traefik handles HTTPS/SSL automatically
#   - Persistent volumes survive redeployments
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MariaDB Database
  # ---------------------------------------------------------------------------
  db:
    image: mariadb:11
    command: --max-allowed-packet=64MB
    restart: always
    volumes:
      - db-data:/var/lib/mysql
    environment:
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_DATABASE: matomo
      MARIADB_USER: matomo
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DISABLE_UPGRADE_BACKUP: "1"
      MARIADB_INITDB_SKIP_TZINFO: "1"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - matomo-internal

  # ---------------------------------------------------------------------------
  # Matomo Application (Apache variant)
  # ---------------------------------------------------------------------------
  app:
    image: matomo:5-apache
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${MATOMO_PORT:-8080}:80"
    volumes:
      - matomo-data:/var/www/html
    environment:
      # Database connection
      MATOMO_DATABASE_HOST: db
      MATOMO_DATABASE_PORT: "3306"
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_TABLES_PREFIX: matomo_
      MATOMO_DATABASE_USERNAME: matomo
      MATOMO_DATABASE_PASSWORD: ${MARIADB_PASSWORD}
      MATOMO_DATABASE_DBNAME: matomo
      # PHP settings
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}
    networks:
      - matomo-internal
    labels:
      # Coolify / Traefik labels (adjust domain as needed)
      - "traefik.enable=true"
      - "traefik.http.routers.matomo.rule=Host(`${MATOMO_DOMAIN:-analytics.yourdomain.com}`)"
      - "traefik.http.routers.matomo.entrypoints=websecure"
      - "traefik.http.routers.matomo.tls.certresolver=letsencrypt"
      - "traefik.http.services.matomo.loadbalancer.server.port=80"

  # ---------------------------------------------------------------------------
  # Cron Archiver (processes reports in background)
  # ---------------------------------------------------------------------------
  # Matomo recommends disabling browser-triggered archiving and using cron
  # instead for better performance. This service runs the archive command
  # every 5 minutes.
  # ---------------------------------------------------------------------------
  cron:
    image: matomo:5-apache
    restart: always
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - matomo-data:/var/www/html
    environment:
      MATOMO_DATABASE_HOST: db
      MATOMO_DATABASE_PORT: "3306"
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_TABLES_PREFIX: matomo_
      MATOMO_DATABASE_USERNAME: matomo
      MATOMO_DATABASE_PASSWORD: ${MARIADB_PASSWORD}
      MATOMO_DATABASE_DBNAME: matomo
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}
    entrypoint: /bin/bash
    command: >
      -c "echo '*/5 * * * * php /var/www/html/console core:archive --url=https://${MATOMO_DOMAIN:-analytics.yourdomain.com} >> /var/log/matomo-archive.log 2>&1' > /etc/cron.d/matomo-archive
      && chmod 0644 /etc/cron.d/matomo-archive
      && crontab /etc/cron.d/matomo-archive
      && cron -f"
    networks:
      - matomo-internal

  # ---------------------------------------------------------------------------
  # Redis (Optional - for QueuedTracking at scale)
  # ---------------------------------------------------------------------------
  # Uncomment this service if you have high traffic (100k+ hits/day).
  # Install the QueuedTracking plugin from the Matomo Marketplace, then
  # configure it in Matomo Admin > General Settings > QueuedTracking.
  # ---------------------------------------------------------------------------
  # redis:
  #   image: redis:7-alpine
  #   restart: always
  #   volumes:
  #     - redis-data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #   networks:
  #     - matomo-internal

volumes:
  db-data:
    driver: local
  matomo-data:
    driver: local
  # redis-data:
  #   driver: local

networks:
  matomo-internal:
    driver: bridge
